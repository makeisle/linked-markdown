<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Linked Mark Down — Playground</title>
    <!-- Resolve the theme before paint (no flash), sharing the docs site's
         preference on this origin (VitePress key). 'auto'/absent → system. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem("vitepress-theme-appearance") || "auto";
          var dark = p === "dark" || (p !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("theme-dark", dark);
        } catch (e) {
          document.documentElement.classList.add("theme-dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
